<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Giriş | Arda Portfolio</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
	<header>
		<nav class="navbar navbar-expand-lg site-navbar">
			<div class="container-fluid px-3 px-lg-4">
				<span class="navbar-brand logo mb-0">Web Sayfam</span>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
						aria-controls="mainNavbar" aria-expanded="false" aria-label="Menüyü aç">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="mainNavbar">
					<ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
						<li class="nav-item"><a class="nav-link active" href="login.html">Giriş</a></li>
					</ul>
				</div>
			</div>
		</nav>
	</header>

	<main class="container login-main">
		<section class="login-card">
			<span class="login-chip">Güvenli Giriş</span>
			<h1>Öğrenci Girişi</h1>
			<p class="login-subtitle">
				Kullanıcı adı: öğrenci numarası mail adresi<br>
				Şifre: sadece öğrenci numarası<br>
				Örnek: b000000000@sakarya.edu.tr / b000000000
			</p>

			<div id="loginError" class="alert alert-danger login-alert d-none" role="alert"></div>

			<form action="login.php" method="POST" novalidate>
				<div class="mb-3">
					<label for="ogrenci_mail" class="form-label">Kullanıcı Adı (Mail)</label>
					<input
						type="email"
						id="ogrenci_mail"
						name="ogrenci_mail"
						class="form-control contact-input"
						placeholder="b000000000@sakarya.edu.tr"
						required
					>
				</div>

				<div class="mb-3">
					<label for="ogrenci_no" class="form-label">Şifre (Öğrenci Numarası)</label>
					<input
						type="password"
						id="ogrenci_no"
						name="ogrenci_no"
						class="form-control contact-input"
						placeholder="b000000000"
						required
					>
				</div>

				<button type="submit" class="login-btn">Giriş Yap</button>
			</form>
		</section>
	</main>

	<footer class="site-footer text-center py-4 mt-5">
		<small>© 2025 Web Sayfam - Tüm hakları saklıdır.</small>
	</footer>

	<script>
		(function () {
			var params = new URLSearchParams(window.location.search);
			var errorMessage = params.get('error');
			var mailValue = params.get('mail');

			if (mailValue) {
				var mailInput = document.getElementById('ogrenci_mail');
				if (mailInput) {
					mailInput.value = mailValue;
				}
			}

			if (errorMessage) {
				var errorBox = document.getElementById('loginError');
				if (errorBox) {
					errorBox.textContent = errorMessage;
					errorBox.classList.remove('d-none');
				}
			}
		})();
	</script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
